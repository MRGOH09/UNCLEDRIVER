<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- 背景 - UBER风格黑色 -->
  <rect width="512" height="512" rx="128" fill="#000000"/>
  
  <!-- 卡车主体 -->
  <g transform="translate(64, 128)">
    <!-- 车厢 -->
    <rect x="0" y="80" width="280" height="120" rx="20" fill="white"/>
    
    <!-- 车头 -->
    <rect x="280" y="100" width="100" height="80" rx="15" fill="white"/>
    
    <!-- 车轮 -->
    <circle cx="80" cy="220" r="25" fill="#666"/>
    <circle cx="240" cy="220" r="25" fill="#666"/>
    <circle cx="340" cy="220" r="25" fill="#666"/>
    
    <!-- 车轮内部 -->
    <circle cx="80" cy="220" r="15" fill="#333"/>
    <circle cx="240" cy="220" r="15" fill="#333"/>
    <circle cx="340" cy="220" r="15" fill="#333"/>
    
    <!-- 车窗 -->
    <rect x="290" y="110" width="80" height="30" rx="5" fill="#87CEEB"/>
    
    <!-- 侧门 -->
    <rect x="20" y="90" width="80" height="80" rx="10" fill="#f0f0f0" stroke="#ddd" stroke-width="2"/>
    <rect x="120" y="90" width="80" height="80" rx="10" fill="#f0f0f0" stroke="#ddd" stroke-width="2"/>
    
    <!-- 门把手 -->
    <circle cx="90" cy="130" r="4" fill="#666"/>
    <circle cx="190" cy="130" r="4" fill="#666"/>
    
    <!-- UNCLE文字 -->
    <text x="140" y="150" font-family="Arial Black, sans-serif" font-size="36" font-weight="900" fill="black" text-anchor="middle">UNCLE</text>
  </g>
  
  <!-- 装饰线条 -->
  <rect x="0" y="380" width="512" height="8" fill="white" opacity="0.8"/>
  <rect x="0" y="400" width="512" height="4" fill="white" opacity="0.6"/>
</svg>